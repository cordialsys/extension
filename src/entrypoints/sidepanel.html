<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Default Side Panel Title</title>

    <!-- Customize the manifest options -->
    <meta
      name="manifest.default_icon"
      content="{
        16: '/icon-16.png',
        24: '/icon-24.png',
        ...
      }"
    />
    <meta name="manifest.open_at_install" content="true" />
    <meta name="manifest.browser_style" content="true" />

    <!-- Set include/exclude if the page should be removed from some builds -->
    <!-- --
    <meta name="manifest.include" content="['chrome', ...]" />
    <meta name="manifest.exclude" content="['chrome', ...]" />
    -->
    <style type="text/css">
      html {
        overflow: auto;
      }
      html,
      body,
      div,
      iframe {
        margin: 0px;
        padding: 0px;
        height: 100%;
        border: none;
      }
      iframe {
        display: block;
        width: 100%;
        border: none;
        overflow-y: auto;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <iframe
      id="treasury-ui"
      frameborder="0"
      marginheight="0"
      marginwidth="0"
      width="100%"
      height="100%"
      scrolling="auto"
      title="embedded UI"
      allow="publickey-credentials-get *"
    ></iframe>

    <script type="module">
      const ui = "%VITE_UI%";
      let uiOrigin = "";
      try {
        uiOrigin = new URL(ui).origin;
      } catch {
        uiOrigin = "";
      }

      function normalizeAddExtensionOrigin(value) {
        if (typeof value !== "string" || !value.trim()) {
          return null;
        }

        try {
          const parsed = new URL(value);
          if (parsed.protocol === "http:" || parsed.protocol === "https:") {
            return parsed.origin;
          }
        } catch {
          // Ignore invalid add-origin hints.
        }

        return null;
      }

      function postDefiContext(addExtensionOrigin, proposalName) {
        const iframe = document.getElementById("treasury-ui");
        if (!(iframe instanceof HTMLIFrameElement) || !iframe.contentWindow) {
          return;
        }
        const message = {
          kind: "cordial:defi:navigate-context",
          addExtensionOrigin: normalizeAddExtensionOrigin(addExtensionOrigin),
          proposalName:
            typeof proposalName === "string" && proposalName.trim()
              ? proposalName
              : null,
        };
        iframe.contentWindow.postMessage(message, uiOrigin || "*");
      }

      async function requestCurrentDefiContext() {
        try {
          const response = await browser.runtime.sendMessage({
            kind: "cordial:sidepanel:get-context",
          });
          postDefiContext(
            response?.addExtensionOrigin ?? null,
            response?.proposalName ?? null,
          );
        } catch (error) {
          console.log("Could not request current DeFi context:", error);
        }
      }

      const iframe = document.getElementById("treasury-ui");
      if (iframe instanceof HTMLIFrameElement) {
        iframe.onload = () => {
          void requestCurrentDefiContext();
        };
        iframe.src = `${ui}defi`;
      }

      browser.runtime.onMessage.addListener((message) => {
        if (!message) {
          return;
        }

        if (message.kind === "cordial:sidepanel:defi-context") {
          postDefiContext(
            message.addExtensionOrigin ?? null,
            message.proposalName ?? null,
          );
        }
      });

      window.addEventListener("message", (event) => {
        const iframe = document.getElementById("treasury-ui");
        if (!(iframe instanceof HTMLIFrameElement)) {
          return;
        }
        if (event.source !== iframe.contentWindow) {
          return;
        }
        if (uiOrigin && event.origin !== uiOrigin) {
          return;
        }

        const message = event.data;
        if (!message || typeof message !== "object" || !("kind" in message)) {
          return;
        }

        if (message.kind === "cordial:defi:config-updated") {
          browser.runtime
            .sendMessage(
              JSON.stringify({ kind: "cordial:sidepanel:refresh-config" }),
            )
            .catch((error) => {
              console.log("Could not request config refresh:", error);
            });
          return;
        }

        if (message.kind === "cordial:defi:proposal-cleared") {
          browser.runtime
            .sendMessage({ kind: "cordial:sidepanel:clear-proposal" })
            .catch((error) => {
              console.log("Could not clear proposal context:", error);
            });
        }
      });
    </script>
  </body>
</html>
