<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Default Side Panel Title</title>

    <!-- Customize the manifest options -->
    <meta
      name="manifest.default_icon"
      content="{
        16: '/icon-16.png',
        24: '/icon-24.png',
        ...
      }"
    />
    <meta name="manifest.open_at_install" content="true" />
    <meta name="manifest.browser_style" content="true" />

    <!-- Set include/exclude if the page should be removed from some builds -->
    <!-- --
    <meta name="manifest.include" content="['chrome', ...]" />
    <meta name="manifest.exclude" content="['chrome', ...]" />
    -->
    <style type="text/css">
      html {
        overflow: auto;
      }
      html,
      body,
      div,
      iframe {
        margin: 0px;
        padding: 0px;
        height: 100%;
        border: none;
      }
      iframe {
        display: block;
        width: 100%;
        border: none;
        overflow-y: auto;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <iframe
      id="treasury-ui"
      frameborder="0"
      marginheight="0"
      marginwidth="0"
      width="100%"
      height="100%"
      scrolling="auto"
      title="embedded UI"
      allow="publickey-credentials-get *; clipboard-write *"
    ></iframe>

    <script type="module">
      const ui = "%VITE_UI%";
      const uiOrigin = new URL(ui).origin;

      function contextFromSearch(search) {
        const proposal = search.get("proposal");
        const addExtensionOrigin = search.get("add-extension-origin");
        const context = {
          kind: "cordial:defi:navigate-context",
        };

        if (proposal) {
          context.proposalName = proposal;
        }

        if (addExtensionOrigin) {
          try {
            const parsed = new URL(addExtensionOrigin);
            if (parsed.protocol === "http:" || parsed.protocol === "https:") {
              context.addExtensionOrigin = parsed.origin;
            }
          } catch {
            // Ignore invalid add-origin hints.
          }
        }

        return context;
      }

      function iframeSrcFromSearch(search) {
        const proposal = search.get("proposal");
        const treasury = search.get("t");
        const addExtensionOrigin = search.get("add-extension-origin");

        let iframeSrc = `${ui}defi`;
        if (proposal) {
          const defiSearch = new URLSearchParams();
          defiSearch.set("proposal", proposal);
          if (treasury) {
            defiSearch.set("t", treasury);
          }
          iframeSrc = `${ui}defi?${defiSearch.toString()}`;
        } else if (addExtensionOrigin) {
          try {
            const parsed = new URL(addExtensionOrigin);
            if (parsed.protocol === "http:" || parsed.protocol === "https:") {
              iframeSrc = `${ui}defi?add-extension-origin=${encodeURIComponent(parsed.origin)}`;
            }
          } catch {
            // Ignore invalid add-origin hints and keep default panel route.
          }
        }

        return iframeSrc;
      }

      function postNavigateContext(search) {
        const iframe = document.getElementById("treasury-ui");
        if (!(iframe instanceof HTMLIFrameElement) || !iframe.contentWindow) {
          return false;
        }

        iframe.contentWindow.postMessage(contextFromSearch(search), uiOrigin);
        return true;
      }

      function navigateFromSearch(search) {
        const iframe = document.getElementById("treasury-ui");
        if (iframe instanceof HTMLIFrameElement) {
          iframe.src = iframeSrcFromSearch(search);
        }
      }

      navigateFromSearch(new URLSearchParams(window.location.search));

      browser.runtime.onMessage.addListener((message) => {
        if (!message || message.kind !== "cordial:sidepanel:navigate") {
          return;
        }

        const rawSearch =
          typeof message.search === "string" ? message.search : "";
        const cleanSearch = rawSearch.startsWith("?")
          ? rawSearch.slice(1)
          : rawSearch;
        const search = new URLSearchParams(cleanSearch);
        if (!postNavigateContext(search)) {
          navigateFromSearch(search);
        }
      });
    </script>
  </body>
</html>
