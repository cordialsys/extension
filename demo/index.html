<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Defi Demo Site</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --accent: #488fff; }
    * { box-sizing: border-box; }
    body { font-family: 'Hanken Grotesk', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 24px; color: #111; }
    h1 { margin: 0 0 8px; }
    p { color: #444; }
    .card { border: 1px solid #eee; border-radius: 12px; padding: 16px; max-width: 560px; }
    button { padding: 10px 14px; border-radius: 10px; border: 1px solid transparent; cursor: pointer; font-weight: 600; background: var(--accent); color: #fff; }
    button.secondary { background: white; color: #222; border-color: #ddd; }
    .row { display: flex; gap: 12px; margin: 8px 0; align-items: center; }
    input, select { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
    .hidden { display: none; }
    .status { margin-top: 12px; color: #666; }
    label { width: 100px; display: inline-block; color: #555; }
    .result-box { background: #f5f5f7; border: 1px solid #eee; border-radius: 12px; padding: 12px; margin-top: 12px; }
    .result-box pre { margin: 0; white-space: pre-wrap; word-break: break-word; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; color: #333; }
  </style>
</head>
<body>
  <h1>Defi Demo</h1>
  <p>This simple site can connect to the Defi extension and request a transfer.</p>
  <div class="card">
    <div id="connect-section">
      <button id="connectBtn">Connect Wallet</button>
      <div class="status" id="connectStatus">Extension is not connected.</div>
    </div>

    <div id="transfer-section" class="hidden">
      <h3>Send Transfer</h3>
      <div class="row"><label>From</label> <input id="from" value="chains/SOL/addresses/AJjsVcPokhVScFXqFFGaUYy9H6HoH9yNzHpbefqRbQFT" /></div>
      <div class="row"><label>To</label> <input id="to" value="chains/SOL/addresses/HC6N1zjDiQx5zMj9oR2y97T2rT8KGeD4DE9TcTHfgzWn" /></div>
      <div class="row"><label>Asset</label> <input id="asset" value="chains/SOL/assets/SOL" /></div>
      <div class="row"><label>Amount</label> <input id="amount" value="0.1" type="number" step="any" /></div>
      <button id="sendBtn">Send Transfer</button>
      <div class="result-box hidden" id="resultBox">
        <pre id="resultPre"></pre>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
